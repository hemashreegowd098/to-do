<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — My To-Do App (Preview)</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="card">

      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
          </svg>
        </div>
        <h1>Welcome <span>back</span></h1>
        <p class="subtitle">Sign in to manage your tasks</p>
      </div>

      <!-- Demo error message -->
      <!-- <div class="alert alert-error">&#9888; Invalid username or password.</div> -->

      <form action="preview_todo.html" method="GET">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" />
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
          Sign In &rarr;
        </button>
      </form>

    </div>
  </div>

</body>
</html>
